      - name: Create build.gradle (app)
        run: |
          cat > app/build.gradle << 'GRADLE'
plugins {
    id 'com.android.application'
}

android {
    namespace 'be.gauthierdoumont.duocompta'
    compileSdk 34

    defaultConfig {
        applicationId "be.gauthierdoumont.duocompta"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
