name: Build DuoCompta APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Setup network security config
        run: |
          mkdir -p android/app/src/main/res/xml
          cp network_security_config.xml android/app/src/main/res/xml/network_security_config.xml

      - name: Patch AndroidManifest
        run: |
          sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' \
            android/app/src/main/AndroidManifest.xml

      - name: Sync web assets
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DuoCompta-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
