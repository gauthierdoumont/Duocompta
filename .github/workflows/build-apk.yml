      - name: Create launcher icons (simple colored circle)
        run: |
          # Creer une icone simple avec Python
          python3 << 'PYTHON'
import struct, zlib, base64

def create_simple_png(size, bg_color, text_color):
    """Cree un PNG simple colore"""
    # PNG header
    def png_chunk(chunk_type, data):
        chunk_len = len(data)
        chunk_data = chunk_type + data
        crc = zlib.crc32(chunk_data) & 0xffffffff
        return struct.pack('>I', chunk_len) + chunk_data + struct.pack('>I', crc)
    
    signature = b'\x89PNG\r\n\x1a\n'
    ihdr_data = struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0)
    ihdr = png_chunk(b'IHDR', ihdr_data)
    
    # Creer image simple couleur unie
    raw_rows = []
    r, g, b = bg_color
    for y in range(size):
        row = b'\x00'  # filter type none
        for x in range(size):
            row += bytes([r, g, b])
        raw_rows.append(row)
    
    compressed = zlib.compress(b''.join(raw_rows))
    idat = png_chunk(b'IDAT', compressed)
    iend = png_chunk(b'IEND', b'')
    
    return signature + ihdr + idat + iend

# Couleur or DuoCompta
gold = (212, 175, 55)

sizes = {
    'hdpi': 72, 'mdpi': 48, 'xhdpi': 96, 'xxhdpi': 144, 'xxxhdpi': 192
}

for density, size in sizes.items():
    png_data = create_simple_png(size, gold, (0,0,0))
    with open(f'app/src/main/res/mipmap-{density}/ic_launcher.png', 'wb') as f:
        f.write(png_data)
    with open(f'app/src/main/res/mipmap-{density}/ic_launcher_round.png', 'wb') as f:
        f.write(png_data)
    print(f"Icon {density} ({size}x{size}) created")
